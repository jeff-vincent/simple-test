apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ui
  labels:
    app: ui
    {{- include "kindling-snapshot.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.ui.replicas }}
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
      - name: ui
        image: {{ .Values.ui.image }}
        imagePullPolicy: Always
        ports:
        - containerPort: {{ .Values.ui.port }}
        env:
        - name: GATEWAY_URL
          value: "http://{{ .Release.Name }}-gateway:9090"
