# Generated by kindling snapshot
#
# Lines marked with ← are the values currently running in your
# kindling dev cluster. Replace the defaults below with your
# production values, or use values-live.yaml as a starting point.

gateway:
  image: "jdvincent/gateway:snapshot-2"
  port: 9090
  replicas: 1
  env:
    ORDERS_URL: "http://orders:5000"  # ← live value
    INVENTORY_URL: "http://inventory:3000"  # ← live value
  ingress:
    enabled: true
    host: ""  # TODO: set your production hostname (dev: gateway.localhost)
    path: "/"
    pathType: "Prefix"
    ingressClassName: "traefik"
    annotations: {}

inventory:
  image: "jdvincent/inventory:snapshot-2"
  port: 3000
  replicas: 1
  env:
    EVENT_STORE_URL: "$(REDIS_URL)"  # ← live value
    REDIS_URL: ""  # TODO: set your production redis connection string
    MONGO_URL: ""  # TODO: set your production mongodb connection string
  ingress:
    enabled: true
    host: ""  # TODO: set your production hostname (dev: inventory.localhost)
    path: "/"
    pathType: "Prefix"
    ingressClassName: "traefik"
    annotations: {}

new_service:
  image: "jdvincent/new-service:snapshot-2"
  port: 3000
  replicas: 1
  env:
    REDIS_URL: ""  # TODO: set your production redis connection string
    MONGO_URL: ""  # TODO: set your production mongodb connection string
  ingress:
    enabled: true
    host: ""  # TODO: set your production hostname (dev: new-service.localhost)
    path: "/"
    pathType: "Prefix"
    ingressClassName: "traefik"
    annotations: {}

notifications:
  image: "jdvincent/notifications:snapshot-2"
  port: 4567
  replicas: 1
  ingress:
    enabled: true
    host: ""  # TODO: set your production hostname (dev: notifications.localhost)
    path: "/"
    pathType: "Prefix"
    ingressClassName: "traefik"
    annotations: {}

orders:
  image: "jdvincent/orders:snapshot-2"
  port: 5000
  replicas: 1
  env:
    DATABASE_URL: ""  # TODO: set your production postgres connection string
    REDIS_URL: ""  # TODO: set your production redis connection string
  ingress:
    enabled: true
    host: ""  # TODO: set your production hostname (dev: orders.localhost)
    path: "/"
    pathType: "Prefix"
    ingressClassName: "traefik"
    annotations: {}

ui:
  image: "jdvincent/ui:snapshot-2"
  port: 80
  replicas: 1
  env:
    GATEWAY_URL: "http://gateway:9090"  # ← live value
  ingress:
    enabled: true
    host: ""  # TODO: set your production hostname (dev: ui.localhost)
    path: "/"
    pathType: "Prefix"
    ingressClassName: "traefik"
    annotations: {}

redis:
  enabled: true
  image: "redis:latest"  # ← dev version
  port: 6379
  # Connection: redis://<release>-redis:6379/0

mongodb:
  enabled: true
  image: "mongo:latest"  # ← dev version
  port: 27017
  env:
    MONGO_INITDB_ROOT_USERNAME: "devuser"  # ← dev default
    MONGO_INITDB_ROOT_PASSWORD: "devpass"  # ← dev default
  # Connection: mongodb://devuser:devpass@<release>-mongodb:27017

postgres:
  enabled: true
  image: "postgres:16"  # ← dev version
  port: 5432
  env:
    POSTGRES_USER: "devuser"  # ← dev default
    POSTGRES_PASSWORD: "devpass"  # ← dev default
    POSTGRES_DB: "devdb"  # ← dev default
  # Connection: postgres://devuser:devpass@<release>-postgres:5432/devdb?sslmode=disable

