# Generated by kindling snapshot — LIVE VALUES
# These are the actual values from your running cluster.
# Install with: helm install <release> ./chart -f values-live.yaml

gateway:
  image: "jdvincent/gateway:snapshot-2"
  port: 9090
  replicas: 1
  env:
    ORDERS_URL: "http://orders:5000"
    INVENTORY_URL: "http://inventory:3000"
  ingress:
    enabled: true
    host: "gateway.localhost"
    path: "/"
    pathType: "Prefix"
    ingressClassName: "traefik"
    annotations: {}

inventory:
  image: "jdvincent/inventory:snapshot-2"
  port: 3000
  replicas: 1
  env:
    EVENT_STORE_URL: "$(REDIS_URL)"
    REDIS_URL: "redis://<release>-redis:6379/0"
    MONGO_URL: "mongodb://devuser:devpass@<release>-mongodb:27017"
  ingress:
    enabled: true
    host: "inventory.localhost"
    path: "/"
    pathType: "Prefix"
    ingressClassName: "traefik"
    annotations: {}

new_service:
  image: "jdvincent/new-service:snapshot-2"
  port: 3000
  replicas: 1
  env:
    REDIS_URL: "redis://<release>-redis:6379/0"
    MONGO_URL: "mongodb://devuser:devpass@<release>-mongodb:27017"
  ingress:
    enabled: true
    host: "new-service.localhost"
    path: "/"
    pathType: "Prefix"
    ingressClassName: "traefik"
    annotations: {}

notifications:
  image: "jdvincent/notifications:snapshot-2"
  port: 4567
  replicas: 1
  ingress:
    enabled: true
    host: "notifications.localhost"
    path: "/"
    pathType: "Prefix"
    ingressClassName: "traefik"
    annotations: {}

orders:
  image: "jdvincent/orders:snapshot-2"
  port: 5000
  replicas: 1
  env:
    DATABASE_URL: "postgres://devuser:devpass@<release>-postgres:5432/devdb?sslmode=disable"
    REDIS_URL: "redis://<release>-redis:6379/0"
  ingress:
    enabled: true
    host: "orders.localhost"
    path: "/"
    pathType: "Prefix"
    ingressClassName: "traefik"
    annotations: {}

ui:
  image: "jdvincent/ui:snapshot-2"
  port: 80
  replicas: 1
  env:
    GATEWAY_URL: "http://gateway:9090"
  ingress:
    enabled: true
    host: "ui.localhost"
    path: "/"
    pathType: "Prefix"
    ingressClassName: "traefik"
    annotations: {}

redis:
  enabled: true
  image: "redis:latest"
  port: 6379

mongodb:
  enabled: true
  image: "mongo:latest"
  port: 27017
  env:
    MONGO_INITDB_ROOT_USERNAME: "devuser"
    MONGO_INITDB_ROOT_PASSWORD: "devpass"

postgres:
  enabled: true
  image: "postgres:16"
  port: 5432
  env:
    POSTGRES_USER: "devuser"
    POSTGRES_PASSWORD: "devpass"
    POSTGRES_DB: "devdb"

