version: 2.1

jobs:
  # ────────────────────────────────────────────────────────────────────
  # BUILD JOBS
  # ────────────────────────────────────────────────────────────────────

  build-gateway:
    machine: true
    resource_class: kindling/kindling
    environment:
      REGISTRY: "registry:5000"
    steps:
      - checkout

      - run:
          name: Set image tag
          command: |
            SAFE_USER=$(echo "$CIRCLE_USERNAME" | tr '[:upper:]' '[:lower:]' | sed 's/@/-/g; s/_/-/g' | tr -cd 'a-z0-9.-' | sed 's/--*/-/g; s/^[-.]*//; s/[-.]*$//')
            echo "export SAFE_USER=${SAFE_USER}" >> "$BASH_ENV"
            echo "export TAG=${SAFE_USER}-${CIRCLE_SHA1:0:8}" >> "$BASH_ENV"

      - run:
          name: Clean builds directory
          command: rm -f /builds/gateway.*

      - run:
          name: Patch Dockerfile for Kaniko (gateway)
          command: |
            sed -i 's/go build /go build -buildvcs=false /' gateway/Dockerfile

      - run:
          name: Build gateway image
          command: |
            tar -czf /builds/gateway.tar.gz -C gateway .
            echo "${REGISTRY}/gateway:${TAG}" > /builds/gateway.dest
            touch /builds/gateway.request

            WAITED=0
            while [ ! -f /builds/gateway.done ]; do
              sleep 2; WAITED=$((WAITED+2))
              if [ ${WAITED} -ge 300 ]; then
                echo "Build timed out"; cat /builds/gateway.log 2>/dev/null; exit 1
              fi
            done

            EXIT_CODE=$(cat /builds/gateway.exitcode 2>/dev/null || echo "1")
            if [ "${EXIT_CODE}" != "0" ]; then
              echo "Build failed"; cat /builds/gateway.log 2>/dev/null; exit 1
            fi
            echo "Built gateway"

  build-inventory:
    machine: true
    resource_class: kindling/kindling
    environment:
      REGISTRY: "registry:5000"
    steps:
      - checkout

      - run:
          name: Set image tag
          command: |
            SAFE_USER=$(echo "$CIRCLE_USERNAME" | tr '[:upper:]' '[:lower:]' | sed 's/@/-/g; s/_/-/g' | tr -cd 'a-z0-9.-' | sed 's/--*/-/g; s/^[-.]*//; s/[-.]*$//')
            echo "export SAFE_USER=${SAFE_USER}" >> "$BASH_ENV"
            echo "export TAG=${SAFE_USER}-${CIRCLE_SHA1:0:8}" >> "$BASH_ENV"

      - run:
          name: Clean builds directory
          command: rm -f /builds/inventory.*

      - run:
          name: Patch Dockerfile for Kaniko (inventory)
          command: |
            sed -i '/^FROM node.*$/a ENV npm_config_cache=\/tmp\/.npm' inventory/Dockerfile

      - run:
          name: Build inventory image
          command: |
            tar -czf /builds/inventory.tar.gz -C inventory .
            echo "${REGISTRY}/inventory:${TAG}" > /builds/inventory.dest
            touch /builds/inventory.request

            WAITED=0
            while [ ! -f /builds/inventory.done ]; do
              sleep 2; WAITED=$((WAITED+2))
              if [ ${WAITED} -ge 300 ]; then
                echo "Build timed out"; cat /builds/inventory.log 2>/dev/null; exit 1
              fi
            done

            EXIT_CODE=$(cat /builds/inventory.exitcode 2>/dev/null || echo "1")
            if [ "${EXIT_CODE}" != "0" ]; then
              echo "Build failed"; cat /builds/inventory.log 2>/dev/null; exit 1
            fi
            echo "Built inventory"

  build-orders:
    machine: true
    resource_class: kindling/kindling
    environment:
      REGISTRY: "registry:5000"
    steps:
      - checkout

      - run:
          name: Set image tag
          command: |
            SAFE_USER=$(echo "$CIRCLE_USERNAME" | tr '[:upper:]' '[:lower:]' | sed 's/@/-/g; s/_/-/g' | tr -cd 'a-z0-9.-' | sed 's/--*/-/g; s/^[-.]*//; s/[-.]*$//')
            echo "export SAFE_USER=${SAFE_USER}" >> "$BASH_ENV"
            echo "export TAG=${SAFE_USER}-${CIRCLE_SHA1:0:8}" >> "$BASH_ENV"

      - run:
          name: Clean builds directory
          command: rm -f /builds/orders.*

      - run:
          name: Build orders image
          command: |
            tar -czf /builds/orders.tar.gz -C orders .
            echo "${REGISTRY}/orders:${TAG}" > /builds/orders.dest
            touch /builds/orders.request

            WAITED=0
            while [ ! -f /builds/orders.done ]; do
              sleep 2; WAITED=$((WAITED+2))
              if [ ${WAITED} -ge 300 ]; then
                echo "Build timed out"; cat /builds/orders.log 2>/dev/null; exit 1
              fi
            done

            EXIT_CODE=$(cat /builds/orders.exitcode 2>/dev/null || echo "1")
            if [ "${EXIT_CODE}" != "0" ]; then
              echo "Build failed"; cat /builds/orders.log 2>/dev/null; exit 1
            fi
            echo "Built orders"

  build-ui:
    machine: true
    resource_class: kindling/kindling
    environment:
      REGISTRY: "registry:5000"
    steps:
      - checkout

      - run:
          name: Set image tag
          command: |
            SAFE_USER=$(echo "$CIRCLE_USERNAME" | tr '[:upper:]' '[:lower:]' | sed 's/@/-/g; s/_/-/g' | tr -cd 'a-z0-9.-' | sed 's/--*/-/g; s/^[-.]*//; s/[-.]*$//')
            echo "export SAFE_USER=${SAFE_USER}" >> "$BASH_ENV"
            echo "export TAG=${SAFE_USER}-${CIRCLE_SHA1:0:8}" >> "$BASH_ENV"

      - run:
          name: Clean builds directory
          command: rm -f /builds/ui.*

      - run:
          name: Patch Dockerfile for Kaniko (ui)
          command: |
            sed -i '/^FROM node.*$/a ENV npm_config_cache=\/tmp\/.npm' ui/Dockerfile

      - run:
          name: Build ui image
          command: |
            tar -czf /builds/ui.tar.gz -C ui .
            echo "${REGISTRY}/ui:${TAG}" > /builds/ui.dest
            touch /builds/ui.request

            WAITED=0
            while [ ! -f /builds/ui.done ]; do
              sleep 2; WAITED=$((WAITED+2))
              if [ ${WAITED} -ge 300 ]; then
                echo "Build timed out"; cat /builds/ui.log 2>/dev/null; exit 1
              fi
            done

            EXIT_CODE=$(cat /builds/ui.exitcode 2>/dev/null || echo "1")
            if [ "${EXIT_CODE}" != "0" ]; then
              echo "Build failed"; cat /builds/ui.log 2>/dev/null; exit 1
            fi
            echo "Built ui"

  # ────────────────────────────────────────────────────────────────────
  # DEPLOY JOBS
  # ────────────────────────────────────────────────────────────────────

  deploy-orders:
    machine: true
    resource_class: kindling/kindling
    environment:
      REGISTRY: "registry:5000"
    steps:
      - run:
          name: Set image tag
          command: |
            SAFE_USER=$(echo "$CIRCLE_USERNAME" | tr '[:upper:]' '[:lower:]' | sed 's/@/-/g; s/_/-/g' | tr -cd 'a-z0-9.-' | sed 's/--*/-/g; s/^[-.]*//; s/[-.]*$//')
            echo "export SAFE_USER=${SAFE_USER}" >> "$BASH_ENV"
            echo "export TAG=${SAFE_USER}-${CIRCLE_SHA1:0:8}" >> "$BASH_ENV"

      - run:
          name: Deploy orders
          command: |
            cat > /builds/${SAFE_USER}-orders-dse.yaml \<<EOF
            apiVersion: apps.example.com/v1alpha1
            kind: DevStagingEnvironment
            metadata:
              name: ${SAFE_USER}-orders
              labels:
                app.kubernetes.io/name: ${SAFE_USER}-orders
                app.kubernetes.io/managed-by: kindling
                app.kubernetes.io/component: orders
                apps.example.com/circleci-username: ${SAFE_USER}
            spec:
              deployment:
                image: ${REGISTRY}/orders:${TAG}
                replicas: 1
                port: 5000
                healthCheck:
                  type: http
                  path: /api/v1/health
                env:
                  - name: LOG_LEVEL
                    value: "debug"
              service:
                port: 5000
                type: ClusterIP
              ingress:
                enabled: true
                host: ${SAFE_USER}-orders.localhost
                ingressClassName: nginx
              dependencies:
                - type: postgres
                - type: redis
            EOF

            touch /builds/${SAFE_USER}-orders-dse.apply

            WAITED=0
            while [ ! -f /builds/${SAFE_USER}-orders-dse.apply-done ]; do
              sleep 1; WAITED=$((WAITED+1))
              if [ ${WAITED} -ge 60 ]; then echo "Deploy timed out"; exit 1; fi
            done

            EXIT_CODE=$(cat /builds/${SAFE_USER}-orders-dse.apply-exitcode 2>/dev/null || echo "1")
            if [ "${EXIT_CODE}" != "0" ]; then
              echo "Deploy failed"
              cat /builds/${SAFE_USER}-orders-dse.apply-log 2>/dev/null
              exit 1
            fi
            echo "Deployed orders"

  deploy-inventory:
    machine: true
    resource_class: kindling/kindling
    environment:
      REGISTRY: "registry:5000"
    steps:
      - run:
          name: Set image tag
          command: |
            SAFE_USER=$(echo "$CIRCLE_USERNAME" | tr '[:upper:]' '[:lower:]' | sed 's/@/-/g; s/_/-/g' | tr -cd 'a-z0-9.-' | sed 's/--*/-/g; s/^[-.]*//; s/[-.]*$//')
            echo "export SAFE_USER=${SAFE_USER}" >> "$BASH_ENV"
            echo "export TAG=${SAFE_USER}-${CIRCLE_SHA1:0:8}" >> "$BASH_ENV"

      - run:
          name: Deploy inventory
          command: |
            cat > /builds/${SAFE_USER}-inventory-dse.yaml \<<EOF
            apiVersion: apps.example.com/v1alpha1
            kind: DevStagingEnvironment
            metadata:
              name: ${SAFE_USER}-inventory
              labels:
                app.kubernetes.io/name: ${SAFE_USER}-inventory
                app.kubernetes.io/managed-by: kindling
                app.kubernetes.io/component: inventory
                apps.example.com/circleci-username: ${SAFE_USER}
            spec:
              deployment:
                image: ${REGISTRY}/inventory:${TAG}
                replicas: 1
                port: 3000
                healthCheck:
                  type: http
                  path: /healthcheck
              service:
                port: 3000
                type: ClusterIP
              ingress:
                enabled: true
                host: ${SAFE_USER}-inventory.localhost
                ingressClassName: nginx
              dependencies:
                - type: mongodb
                - type: redis
            EOF

            touch /builds/${SAFE_USER}-inventory-dse.apply

            WAITED=0
            while [ ! -f /builds/${SAFE_USER}-inventory-dse.apply-done ]; do
              sleep 1; WAITED=$((WAITED+1))
              if [ ${WAITED} -ge 60 ]; then echo "Deploy timed out"; exit 1; fi
            done

            EXIT_CODE=$(cat /builds/${SAFE_USER}-inventory-dse.apply-exitcode 2>/dev/null || echo "1")
            if [ "${EXIT_CODE}" != "0" ]; then
              echo "Deploy failed"
              cat /builds/${SAFE_USER}-inventory-dse.apply-log 2>/dev/null
              exit 1
            fi
            echo "Deployed inventory"

  deploy-gateway:
    machine: true
    resource_class: kindling/kindling
    environment:
      REGISTRY: "registry:5000"
    steps:
      - run:
          name: Set image tag
          command: |
            SAFE_USER=$(echo "$CIRCLE_USERNAME" | tr '[:upper:]' '[:lower:]' | sed 's/@/-/g; s/_/-/g' | tr -cd 'a-z0-9.-' | sed 's/--*/-/g; s/^[-.]*//; s/[-.]*$//')
            echo "export SAFE_USER=${SAFE_USER}" >> "$BASH_ENV"
            echo "export TAG=${SAFE_USER}-${CIRCLE_SHA1:0:8}" >> "$BASH_ENV"

      - run:
          name: Deploy gateway
          command: |
            cat > /builds/${SAFE_USER}-gateway-dse.yaml \<<EOF
            apiVersion: apps.example.com/v1alpha1
            kind: DevStagingEnvironment
            metadata:
              name: ${SAFE_USER}-gateway
              labels:
                app.kubernetes.io/name: ${SAFE_USER}-gateway
                app.kubernetes.io/managed-by: kindling
                app.kubernetes.io/component: gateway
                apps.example.com/circleci-username: ${SAFE_USER}
            spec:
              deployment:
                image: ${REGISTRY}/gateway:${TAG}
                replicas: 1
                port: 9090
                healthCheck:
                  type: http
                  path: /-/ready
                env:
                  - name: ORDERS_URL
                    value: "http://${SAFE_USER}-orders:5000"
                  - name: INVENTORY_URL
                    value: "http://${SAFE_USER}-inventory:3000"
              service:
                port: 9090
                type: ClusterIP
              ingress:
                enabled: true
                host: ${SAFE_USER}-gateway.localhost
                ingressClassName: nginx
            EOF

            touch /builds/${SAFE_USER}-gateway-dse.apply

            WAITED=0
            while [ ! -f /builds/${SAFE_USER}-gateway-dse.apply-done ]; do
              sleep 1; WAITED=$((WAITED+1))
              if [ ${WAITED} -ge 60 ]; then echo "Deploy timed out"; exit 1; fi
            done

            EXIT_CODE=$(cat /builds/${SAFE_USER}-gateway-dse.apply-exitcode 2>/dev/null || echo "1")
            if [ "${EXIT_CODE}" != "0" ]; then
              echo "Deploy failed"
              cat /builds/${SAFE_USER}-gateway-dse.apply-log 2>/dev/null
              exit 1
            fi
            echo "Deployed gateway"

  deploy-ui:
    machine: true
    resource_class: kindling/kindling
    environment:
      REGISTRY: "registry:5000"
    steps:
      - run:
          name: Set image tag
          command: |
            SAFE_USER=$(echo "$CIRCLE_USERNAME" | tr '[:upper:]' '[:lower:]' | sed 's/@/-/g; s/_/-/g' | tr -cd 'a-z0-9.-' | sed 's/--*/-/g; s/^[-.]*//; s/[-.]*$//')
            echo "export SAFE_USER=${SAFE_USER}" >> "$BASH_ENV"
            echo "export TAG=${SAFE_USER}-${CIRCLE_SHA1:0:8}" >> "$BASH_ENV"

      - run:
          name: Deploy ui
          command: |
            cat > /builds/${SAFE_USER}-ui-dse.yaml \<<EOF
            apiVersion: apps.example.com/v1alpha1
            kind: DevStagingEnvironment
            metadata:
              name: ${SAFE_USER}-ui
              labels:
                app.kubernetes.io/name: ${SAFE_USER}-ui
                app.kubernetes.io/managed-by: kindling
                app.kubernetes.io/component: ui
                apps.example.com/circleci-username: ${SAFE_USER}
            spec:
              deployment:
                image: ${REGISTRY}/ui:${TAG}
                replicas: 1
                port: 80
                healthCheck:
                  type: http
                  path: /
                env:
                  - name: GATEWAY_URL
                    value: "http://${SAFE_USER}-gateway:9090"
              service:
                port: 80
                type: ClusterIP
              ingress:
                enabled: true
                host: ${SAFE_USER}-ui.localhost
                ingressClassName: nginx
            EOF

            touch /builds/${SAFE_USER}-ui-dse.apply

            WAITED=0
            while [ ! -f /builds/${SAFE_USER}-ui-dse.apply-done ]; do
              sleep 1; WAITED=$((WAITED+1))
              if [ ${WAITED} -ge 60 ]; then echo "Deploy timed out"; exit 1; fi
            done

            EXIT_CODE=$(cat /builds/${SAFE_USER}-ui-dse.apply-exitcode 2>/dev/null || echo "1")
            if [ "${EXIT_CODE}" != "0" ]; then
              echo "Deploy failed"
              cat /builds/${SAFE_USER}-ui-dse.apply-log 2>/dev/null
              exit 1
            fi

            echo "Deployment complete!"
            echo "UI:        http://${SAFE_USER}-ui.localhost"
            echo "Gateway:   http://${SAFE_USER}-gateway.localhost"
            echo "Orders:    http://${SAFE_USER}-orders.localhost"
            echo "Inventory: http://${SAFE_USER}-inventory.localhost"

# ────────────────────────────────────────────────────────────────────
# WORKFLOW
# ────────────────────────────────────────────────────────────────────
workflows:
  dev-deploy:
    jobs:
      - build-gateway:
          filters:
            branches:
              only: main
      - build-inventory:
          filters:
            branches:
              only: main
      - build-orders:
          filters:
            branches:
              only: main
      - build-ui:
          filters:
            branches:
              only: main
      - deploy-orders:
          requires:
            - build-orders
      - deploy-inventory:
          requires:
            - build-inventory
      - deploy-gateway:
          requires:
            - build-gateway
            - deploy-orders
            - deploy-inventory
      - deploy-ui:
          requires:
            - build-ui
            - deploy-gateway
